# Continue MCP Configuration Examples
# Copy the relevant section to your ~/.continue/config.yaml

# Option 1: HTTP Transport (Recommended when using Docker)
# Works with Claude Desktop and Continue
# Requires: docker-compose up mcp-server
mcpServers:
  - name: autogen-pentest
    type: streamable-http
    url: http://localhost:8016/mcp

