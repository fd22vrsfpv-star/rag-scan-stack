server {
    listen 9876;

    location / {
        proxy_pass http://host.docker.internal:9876;
        proxy_set_header Host 127.0.0.1:9876;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
