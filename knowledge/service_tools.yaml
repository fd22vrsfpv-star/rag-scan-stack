# Service Tool Recommendations Knowledge Base
# Maps services/ports to recommended penetration testing tools
# Used by scan-recommender to provide AI agents with tool recommendations

# ---------------------------------------------------------------------------
# tool_metadata: classifies tools and declares where they overlap.
#
# - type "cve_lookup" tools are NOT scanners: they look up known CVEs for a
#   product+version that was ALREADY detected. The recommender does NOT emit
#   them as per-service scan recommendations; they run via the assets software
#   flow (software-assets / bulk-check) instead.
# - overlap_groups list tools/modules that return substantially the SAME data.
#   The recommender tags each rec with its group and treats a group as an "OR"
#   (recommend one, not all) so e.g. nmap -sV, ssh-audit, and the metasploit
#   *_version modules aren't all queued for the same banner.
# ---------------------------------------------------------------------------
tool_metadata:
  tools:
    vulnx:
      type: cve_lookup          # NOT a scanner
      active: false             # offline CVE DB lookup; does not touch the target
      needs: [product, version]
      note: >
        vulnx is NOT a network/port scanner. It looks up known CVEs for a
        product+version already detected by another tool. Never recommend it
        as a port/service probe or run it "against a port" — it only consumes
        prior version-detection output. Surfaced via the assets software view.

  # Tools/modules within a group return overlapping data → recommend ONE (OR).
  # A member may be a tool name, or "metasploit:<glob>" to match MSF modules.
  overlap_groups:
    version_detection:
      description: "Service product + version banner — pick one (nmap -sV and the metasploit *_version modules return the same banner)."
      members: [nmap, "metasploit:*_version"]
    content_discovery:
      description: "Directory/file brute force — pick one."
      members: [gobuster, feroxbuster, dirsearch, wfuzz, ffuf]
    web_vuln_scan:
      description: "Generic web vulnerability scan — pick one."
      members: [nikto, nuclei]
    tech_fingerprint:
      description: "Web technology fingerprint — pick one."
      members: [whatweb, wappalyzer]
    login_bruteforce:
      description: "Credential brute force — pick one."
      members: [hydra, medusa, ncrack, "metasploit:*_login"]
    sql_injection:
      description: "SQL injection testing."
      members: [sqlmap]
    # Native enum/recon tools cover these MSF auxiliary scanners — the native
    # one is recommended first, so it wins the OR and the MSF module is dropped.
    smb_enum:
      description: "SMB share/user enumeration — smbmap/enum4linux cover it."
      members: [smbmap, "metasploit:*smb_enumshares", "metasploit:*smb_enumusers"]
    snmp_enum:
      description: "SNMP enumeration — snmpwalk covers it."
      members: [snmpwalk, "metasploit:*snmp_enum"]
    dns_recon:
      description: "DNS info/brute — dnsenum/dnsrecon cover it."
      members: [dnsenum, "metasploit:*dns_info", "metasploit:*dns_bruteforce"]

  # Recommendations the recommender should NEVER emit (a lighter/native tool
  # already does the job). Each rule matches a scanner [+ optional service +
  # selector glob vs the rec's script/module]. This is config — edit here (it
  # reloads from git), no code change. The DB feedback loop layers on top for
  # per-install / ad-hoc tweaks.
  suppress:
    - scanner: metasploit
      selector: "*_version"
      reason: "Version/banner already captured by nmap -sV / httpx / tlsx."
    - scanner: metasploit
      selector: "*robots_txt"
      reason: "Trivial HTTP GET — use curl, no need to load Metasploit."
    - scanner: metasploit
      service: http
      selector: "*dir_scanner"
      reason: "Content discovery covered by gobuster / feroxbuster."
    - scanner: metasploit
      service: http
      selector: "*files_dir"
      reason: "Content discovery covered by gobuster / feroxbuster."

services:
  ssh:
    ports: [22, 2222, 22222]
    description: "Secure Shell - remote access protocol"
    tools:
      - name: nmap
        purpose: banner grab & version detection
        command: "nmap -sV -sC -p {port} {target}"
      - name: ssh-audit
        purpose: configuration and algorithm audit
        command: "ssh-audit --no-colors {target}:{port}"
      - name: hydra
        purpose: brute force credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt ssh://{target}:{port}"
      - name: medusa
        purpose: parallel brute force
        command: "medusa -h {target} -U /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt -M ssh"
      - name: ncrack
        purpose: network authentication cracker
        command: "ncrack -p {port} --user root -P /usr/share/wordlists/rockyou.txt {target}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/ssh/ssh_version
        purpose: SSH version detection
      - module: auxiliary/scanner/ssh/ssh_login
        purpose: SSH login brute force
      - module: auxiliary/scanner/ssh/ssh_enumusers
        purpose: SSH user enumeration
      - module: auxiliary/scanner/ssh/ssh_login_pubkey
        purpose: SSH public key authentication test
    nuclei_tags: ["ssh", "network", "default-login", "cve"]
    common_vulns:
      - "CVE-2018-15473: OpenSSH User Enumeration (< 7.7)"
      - "CVE-2016-0777: OpenSSH Roaming Bug"
      - "CVE-2016-0778: OpenSSH Buffer Overflow"
      - "Weak key exchange algorithms"
      - "Weak ciphers (arcfour, 3des-cbc)"
      - "Default/weak credentials"

  http:
    ports: [80, 8080, 8000, 8008, 3000, 5000, 8888, 9000]
    description: "HTTP - Web server (unencrypted)"
    tools:
      - name: httpx
        purpose: HTTP fingerprint, tech detect, title, status code
        command: "httpx -u http://{target}:{port} -title -tech-detect -status-code -web-server -follow-redirects"
      - name: nikto
        purpose: web vulnerability scanner
        command: "nikto -h http://{target}:{port}"
      - name: gobuster
        purpose: directory and file bruteforce
        command: "gobuster dir -u http://{target}:{port} -w /usr/share/wordlists/dirb/common.txt"
      - name: feroxbuster
        purpose: fast recursive content discovery
        command: "feroxbuster -u http://{target}:{port} -w /usr/share/wordlists/dirb/common.txt"
      - name: dirsearch
        purpose: web path scanner
        command: "dirsearch -u http://{target}:{port}"
      - name: nuclei
        purpose: template-based vulnerability scanning
        command: "nuclei -u http://{target}:{port} -tags cve,misconfig,exposure"
      - name: whatweb
        purpose: technology fingerprinting
        command: "whatweb http://{target}:{port}"
      - name: wappalyzer
        purpose: technology detection
        command: "wappalyzer http://{target}:{port}"
      - name: sqlmap
        purpose: SQL injection testing
        command: "sqlmap -u 'http://{target}:{port}/?id=1' --batch"
      - name: wfuzz
        purpose: web fuzzing
        command: "wfuzz -c -z file,wordlist.txt http://{target}:{port}/FUZZ"
      - name: ffuf
        purpose: fast web fuzzer
        command: "ffuf -u http://{target}:{port}/FUZZ -w /usr/share/wordlists/dirb/common.txt"
      - name: curl
        purpose: manual HTTP requests
        command: "curl -v http://{target}:{port}/"
      - name: curl
        purpose: fetch & parse robots.txt
        command: "curl -s http://{target}:{port}/robots.txt"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/http/http_version
        purpose: HTTP version detection
      - module: auxiliary/scanner/http/dir_scanner
        purpose: directory enumeration
      - module: auxiliary/scanner/http/files_dir
        purpose: interesting file scanner
      - module: auxiliary/scanner/http/http_login
        purpose: HTTP login brute force
      - module: auxiliary/scanner/http/robots_txt
        purpose: robots.txt parser
    nuclei_tags: ["http", "cve", "misconfig", "exposure", "default-login", "tech", "xss", "sqli", "lfi", "rfi", "ssrf"]
    common_vulns:
      - "Directory traversal / LFI"
      - "SQL injection"
      - "Cross-site scripting (XSS)"
      - "Server-side request forgery (SSRF)"
      - "Remote code execution"
      - "Default credentials"
      - "Information disclosure"

  https:
    ports: [443, 8443, 4443, 9443]
    description: "HTTPS - Web server (TLS encrypted)"
    tools:
      - name: httpx
        purpose: HTTPS fingerprint, tech detect, TLS probe, title
        command: "httpx -u https://{target}:{port} -title -tech-detect -status-code -tls-probe -web-server -follow-redirects"
      - name: sslscan
        purpose: SSL/TLS cipher enumeration
        command: "sslscan {target}:{port}"
      - name: testssl
        purpose: comprehensive SSL/TLS testing
        command: "testssl.sh {target}:{port}"
      - name: sslyze
        purpose: SSL configuration analyzer
        command: "sslyze {target}:{port}"
      - name: nikto
        purpose: web vulnerability scanner
        command: "nikto -h https://{target}:{port}"
      - name: gobuster
        purpose: directory bruteforce
        command: "gobuster dir -u https://{target}:{port} -w /usr/share/wordlists/dirb/common.txt -k"
      - name: nuclei
        purpose: template-based vulnerability scanning
        command: "nuclei -u https://{target}:{port} -tags cve,misconfig,exposure,ssl"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/http/http_version
        purpose: HTTPS version detection
      - module: auxiliary/scanner/http/ssl_version
        purpose: SSL/TLS version detection
      - module: auxiliary/scanner/http/cert
        purpose: SSL certificate information
    nuclei_tags: ["ssl", "tls", "https", "cve", "misconfig", "certificate"]
    common_vulns:
      - "Heartbleed (CVE-2014-0160)"
      - "POODLE (CVE-2014-3566)"
      - "BEAST attack"
      - "CRIME attack"
      - "Weak ciphers"
      - "Expired certificates"
      - "Self-signed certificates"

  ftp:
    ports: [21, 2121]
    description: "FTP - File Transfer Protocol"
    tools:
      - name: nmap
        purpose: FTP enumeration scripts
        command: "nmap -sV -sC -p {port} --script=ftp-* {target}"
      - name: hydra
        purpose: brute force FTP credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt ftp://{target}:{port}"
      - name: ftp
        purpose: manual connection test
        command: "ftp {target} {port}"
      - name: lftp
        purpose: advanced FTP client
        command: "lftp -u anonymous, ftp://{target}:{port}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/ftp/ftp_version
        purpose: FTP version detection
      - module: auxiliary/scanner/ftp/ftp_login
        purpose: FTP login brute force
      - module: auxiliary/scanner/ftp/anonymous
        purpose: anonymous FTP access check
      - module: exploit/unix/ftp/vsftpd_234_backdoor
        purpose: vsftpd 2.3.4 backdoor
      - module: exploit/unix/ftp/proftpd_133c_backdoor
        purpose: ProFTPD 1.3.3c backdoor
    nuclei_tags: ["ftp", "network", "default-login", "cve"]
    common_vulns:
      - "Anonymous FTP access"
      - "vsftpd 2.3.4 backdoor"
      - "ProFTPD vulnerabilities"
      - "Cleartext credentials"
      - "Directory traversal"

  mysql:
    ports: [3306, 33060]
    description: "MySQL/MariaDB - Database server"
    tools:
      - name: nmap
        purpose: MySQL enumeration
        command: "nmap -sV -sC -p {port} --script=mysql-* {target}"
      - name: mysql
        purpose: direct connection
        command: "mysql -h {target} -P {port} -u root"
      - name: hydra
        purpose: brute force credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt mysql://{target}:{port}"
      - name: mysqltuner
        purpose: security audit
        command: "mysqltuner --host {target} --port {port}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/mysql/mysql_version
        purpose: MySQL version detection
      - module: auxiliary/scanner/mysql/mysql_login
        purpose: MySQL login brute force
      - module: auxiliary/admin/mysql/mysql_enum
        purpose: MySQL enumeration
      - module: auxiliary/scanner/mysql/mysql_hashdump
        purpose: MySQL hash dump
      - module: exploit/multi/mysql/mysql_udf_payload
        purpose: MySQL UDF code execution
    nuclei_tags: ["mysql", "database", "default-login", "cve"]
    common_vulns:
      - "Empty root password"
      - "Remote root login"
      - "UDF privilege escalation"
      - "SQL injection"
      - "CVE-2012-2122: Authentication bypass"

  postgresql:
    ports: [5432, 5433]
    description: "PostgreSQL - Database server"
    tools:
      - name: nmap
        purpose: PostgreSQL enumeration
        command: "nmap -sV -sC -p {port} --script=pgsql-* {target}"
      - name: psql
        purpose: direct connection
        command: "psql -h {target} -p {port} -U postgres"
      - name: hydra
        purpose: brute force credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt postgres://{target}:{port}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/postgres/postgres_version
        purpose: PostgreSQL version detection
      - module: auxiliary/scanner/postgres/postgres_login
        purpose: PostgreSQL login brute force
      - module: auxiliary/admin/postgres/postgres_sql
        purpose: PostgreSQL SQL execution
      - module: exploit/linux/postgres/postgres_payload
        purpose: PostgreSQL code execution
    nuclei_tags: ["postgresql", "postgres", "database", "default-login", "cve"]
    common_vulns:
      - "Trust authentication"
      - "Default postgres user"
      - "COPY TO/FROM PROGRAM RCE"
      - "Large object abuse"

  mssql:
    ports: [1433, 1434]
    description: "Microsoft SQL Server - Database"
    tools:
      - name: nmap
        purpose: MSSQL enumeration
        command: "nmap -sV -sC -p {port} --script=ms-sql-* {target}"
      - name: sqsh
        purpose: SQL client
        command: "sqsh -S {target}:{port} -U sa"
      - name: impacket-mssqlclient
        purpose: Python MSSQL client
        command: "impacket-mssqlclient sa@{target} -port {port}"
      - name: hydra
        purpose: brute force credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt mssql://{target}:{port}"
    metasploit:
      - module: auxiliary/scanner/mssql/mssql_ping
        purpose: MSSQL discovery
      - module: auxiliary/scanner/mssql/mssql_login
        purpose: MSSQL login brute force
      - module: auxiliary/admin/mssql/mssql_enum
        purpose: MSSQL enumeration
      - module: exploit/windows/mssql/mssql_payload
        purpose: MSSQL code execution
      - module: auxiliary/admin/mssql/mssql_exec
        purpose: xp_cmdshell execution
    nuclei_tags: ["mssql", "database", "default-login", "cve"]
    common_vulns:
      - "xp_cmdshell enabled"
      - "Weak sa password"
      - "SQL injection"
      - "Linked server abuse"

  smb:
    ports: [445, 139]
    description: "SMB/CIFS - Windows/Linux file sharing and Samba"
    tools:
      - name: nmap
        purpose: SMB enumeration
        command: "nmap -sV -sC -p {port} --script=smb-* {target}"
      - name: nmap-smb-vuln
        purpose: SMB vulnerability scan (includes CVE-2007-2447)
        command: "nmap -p 139,445 --script=smb-vuln-*,smb-enum-shares,smb-enum-users {target}"
      - name: smbclient
        purpose: SMB client
        command: "smbclient -L //{target}/ -N"
      - name: smbmap
        purpose: SMB share enumeration
        command: "smbmap -H {target}"
      - name: enum4linux
        purpose: SMB/NetBIOS enumeration
        command: "enum4linux -a {target}"
      - name: enum4linux-ng
        purpose: modern SMB enumeration
        command: "enum4linux-ng -A {target}"
      - name: crackmapexec
        purpose: SMB authentication and enumeration
        command: "crackmapexec smb {target} -u '' -p '' --shares"
      - name: impacket-smbclient
        purpose: Python SMB client
        command: "impacket-smbclient {target}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/smb/smb_version
        purpose: SMB version detection
      - module: auxiliary/scanner/smb/smb_enumshares
        purpose: SMB share enumeration
      - module: auxiliary/scanner/smb/smb_enumusers
        purpose: SMB user enumeration
      - module: auxiliary/scanner/smb/smb_login
        purpose: SMB login brute force
      - module: exploit/multi/samba/usermap_script
        purpose: "Samba username map script RCE (CVE-2007-2447) - CRITICAL for Samba 3.0.20-3.0.25rc3"
      - module: exploit/windows/smb/ms17_010_eternalblue
        purpose: EternalBlue (MS17-010)
      - module: exploit/windows/smb/ms08_067_netapi
        purpose: MS08-067 NetAPI
      - module: exploit/linux/samba/is_known_pipename
        purpose: Samba CVE-2017-7494 SambaCry
    nuclei_tags: ["smb", "cifs", "network", "cve", "default-login", "samba"]
    common_vulns:
      - "CVE-2007-2447: Samba username map script command injection (Samba 3.0.20-3.0.25rc3)"
      - "MS17-010 EternalBlue"
      - "MS08-067 NetAPI"
      - "CVE-2017-7494 SambaCry"
      - "Null session"
      - "Anonymous access"
      - "Writable shares"
      - "SMB signing disabled"

  rdp:
    ports: [3389]
    description: "RDP - Remote Desktop Protocol"
    tools:
      - name: nmap
        purpose: RDP enumeration
        command: "nmap -sV -sC -p {port} --script=rdp-* {target}"
      - name: xfreerdp
        purpose: RDP client
        command: "xfreerdp /v:{target}:{port} /u:administrator"
      - name: rdesktop
        purpose: RDP client
        command: "rdesktop {target}:{port}"
      - name: hydra
        purpose: brute force credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt rdp://{target}:{port}"
      - name: crowbar
        purpose: RDP brute force
        command: "crowbar -b rdp -s {target}/32 -u admin -C /usr/share/wordlists/rockyou.txt"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/rdp/rdp_scanner
        purpose: RDP service detection
      - module: auxiliary/scanner/rdp/cve_2019_0708_bluekeep
        purpose: BlueKeep vulnerability check
      - module: exploit/windows/rdp/cve_2019_0708_bluekeep_rce
        purpose: BlueKeep RCE
    nuclei_tags: ["rdp", "network", "cve", "windows"]
    common_vulns:
      - "CVE-2019-0708 BlueKeep"
      - "CVE-2019-1181/1182 DejaBlue"
      - "Weak credentials"
      - "NLA disabled"

  telnet:
    ports: [23, 2323]
    description: "Telnet - Unencrypted remote access"
    tools:
      - name: nmap
        purpose: Telnet enumeration
        command: "nmap -sV -sC -p {port} --script=telnet-* {target}"
      - name: telnet
        purpose: manual connection
        command: "telnet {target} {port}"
      - name: hydra
        purpose: brute force credentials
        command: "hydra -L /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -P /usr/share/wordlists/rockyou.txt telnet://{target}:{port}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/telnet/telnet_version
        purpose: Telnet version detection
      - module: auxiliary/scanner/telnet/telnet_login
        purpose: Telnet login brute force
    nuclei_tags: ["telnet", "network", "default-login"]
    common_vulns:
      - "Cleartext credentials"
      - "Default credentials"
      - "Banner information disclosure"

  smtp:
    ports: [25, 465, 587]
    description: "SMTP - Email server"
    tools:
      - name: nmap
        purpose: SMTP enumeration
        command: "nmap -sV -sC -p {port} --script=smtp-* {target}"
      - name: smtp-user-enum
        purpose: user enumeration
        command: "smtp-user-enum -M VRFY -U /usr/share/wordlists/seclists/Usernames/top-usernames-shortlist.txt -t {target} -p {port}"
      - name: swaks
        purpose: SMTP testing tool
        command: "swaks --to test@{target} --server {target}:{port}"
      - name: vulnx
        purpose: CVE lookup by product and version
        command: "vulnx search \"{product} {version}\" --json"
    metasploit:
      - module: auxiliary/scanner/smtp/smtp_version
        purpose: SMTP version detection
      - module: auxiliary/scanner/smtp/smtp_enum
        purpose: SMTP user enumeration
      - module: auxiliary/scanner/smtp/smtp_relay
        purpose: SMTP relay check
    nuclei_tags: ["smtp", "mail", "network", "cve"]
    common_vulns:
      - "Open relay"
      - "User enumeration via VRFY/EXPN"
      - "STARTTLS downgrade"

  dns:
    ports: [53]
    description: "DNS - Domain Name System"
    tools:
      - name: nmap
        purpose: DNS enumeration
        command: "nmap -sV -sC -p {port} --script=dns-* {target}"
      - name: dig
        purpose: DNS queries
        command: "dig @{target} -p {port} ANY example.com"
      - name: dnsrecon
        purpose: DNS reconnaissance
        command: "dnsrecon -d example.com -n {target}"
      - name: dnsenum
        purpose: DNS enumeration
        command: "dnsenum --dnsserver {target} example.com"
    metasploit:
      - module: auxiliary/scanner/dns/dns_amp
        purpose: DNS amplification check
      - module: auxiliary/gather/dns_bruteforce
        purpose: DNS subdomain brute force
      - module: auxiliary/gather/dns_info
        purpose: DNS information gathering
    nuclei_tags: ["dns", "network", "cve"]
    common_vulns:
      - "Zone transfer allowed"
      - "DNS cache poisoning"
      - "DNS amplification"
      - "BIND vulnerabilities"

  subdomain_enum:
    ports: []
    description: "Subdomain Enumeration - passive and active subdomain discovery"
    tools:
      - name: subfinder
        purpose: passive subdomain enumeration
        command: "subfinder -d {target} -silent"
      - name: dnsx
        purpose: DNS resolution and enrichment
        command: "dnsx -d {target} -a -aaaa -cname -mx -ns -silent"
      - name: alterx
        purpose: subdomain permutation wordlist generation
        command: "alterx -d {target} -silent"
    metasploit:
      - module: auxiliary/gather/dns_bruteforce
        purpose: DNS subdomain brute force
    nuclei_tags: ["dns", "subdomain", "takeover"]
    common_vulns:
      - "Subdomain takeover (dangling CNAME)"
      - "Exposed internal services on subdomains"
      - "Information disclosure via DNS records"

  ldap:
    ports: [389, 636, 3268, 3269]
    description: "LDAP - Lightweight Directory Access Protocol"
    tools:
      - name: nmap
        purpose: LDAP enumeration
        command: "nmap -sV -sC -p {port} --script=ldap-* {target}"
      - name: ldapsearch
        purpose: LDAP queries
        command: "ldapsearch -x -H ldap://{target}:{port} -b 'dc=example,dc=com'"
      - name: ldapdomaindump
        purpose: domain dump
        command: "ldapdomaindump -u 'domain\\user' -p password {target}"
    metasploit:
      - module: auxiliary/gather/ldap_query
        purpose: LDAP queries
      - module: auxiliary/scanner/ldap/ldap_search
        purpose: LDAP enumeration
    nuclei_tags: ["ldap", "network", "cve", "active-directory"]
    common_vulns:
      - "Anonymous bind allowed"
      - "LDAP injection"
      - "Information disclosure"

  vnc:
    ports: [5900, 5901, 5902, 5903]
