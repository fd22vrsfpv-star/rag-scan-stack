    tools:
      - name: nmap
        purpose: AFP server info + shares
        command: "nmap -sV --script afp-showmount,afp-serverinfo -p {port} {target}"
    metasploit:
      - module: auxiliary/scanner/afp/afp_login
        purpose: AFP login brute
    nuclei_tags: ["afp", "apple", "filesharing", "network"]
    common_vulns:
      - "Anonymous mount of root volume"
      - "Default guest access enabled"

  iscsi:
    ports: [860, 3260]
    description: "iSCSI - SCSI commands over TCP"
    tools:
      - name: nmap
        purpose: iSCSI target / LUN enumeration
        command: "nmap -sV --script iscsi-info,iscsi-brute -p {port} {target}"
      - name: iscsiadm
        purpose: discover and login to targets
        command: "iscsiadm -m discovery -t sendtargets -p {target}:{port}"
    nuclei_tags: ["iscsi", "storage", "network"]
    common_vulns:
      - "Anonymous SendTargets exposes LUN names"
      - "No CHAP authentication"

  # ---- Industrial / IoT ----
  modbus:
    ports: [502]
    description: "Modbus TCP - industrial control protocol"
    tools:
      - name: nmap
        purpose: Modbus device + slave-id enumeration
        command: "nmap -sV --script modbus-discover -p {port} {target}"
      - name: modbus-cli
        purpose: read coil / register
        command: "modbus -h {target} -p {port} read 1 100"
    metasploit:
      - module: auxiliary/scanner/scada/modbusclient
        purpose: Modbus client scanner
    nuclei_tags: ["modbus", "scada", "ics", "iot", "exposure"]
    common_vulns:
      - "Unauthenticated read/write of holding registers"
      - "Coil writes can stop industrial processes"

  bacnet:
    ports: [47808]
    description: "BACnet - building automation protocol"
    tools:
      - name: nmap
        purpose: BACnet device discovery
        command: "nmap -sU --script bacnet-info -p {port} {target}"
    nuclei_tags: ["bacnet", "scada", "ics", "iot", "udp"]
    common_vulns:
      - "Anonymous device-info reveals vendor/model/firmware"

  ethernetip:
    ports: [44818]
    description: "EtherNet/IP - industrial automation (Rockwell / Allen-Bradley)"
    tools:
      - name: nmap
        purpose: EtherNet/IP device enumeration
        command: "nmap -sV --script enip-info -p {port} {target}"
    nuclei_tags: ["enip", "ethernetip", "scada", "ics", "rockwell"]
    common_vulns:
      - "Anonymous identity request leaks PLC model + firmware"

  coap:
    ports: [5683, 5684]
    description: "CoAP - Constrained Application Protocol (IoT)"
    tools:
      - name: nmap
        purpose: CoAP resource discovery
        command: "nmap -sU --script coap-resources -p {port} {target}"
      - name: coap-client
        purpose: probe well-known resources
        command: "coap-client coap://{target}:{port}/.well-known/core"
    nuclei_tags: ["coap", "iot", "udp", "exposure"]
    common_vulns:
      - "Amplification source (RFC 7252 §11.3)"
      - "Unauthenticated resource discovery"

  # ---- Virtualization / management ----
  vmware_esxi:
    ports: [902, 903, 443, 5988, 5989, 8000, 8100, 8182]
    description: "VMware ESXi / vCenter - hypervisor management"
    tools:
      - name: httpx
        purpose: ESXi welcome page fingerprint
        command: "httpx -u https://{target}:{port} -title -tech-detect -tls-probe"
      - name: nuclei
        purpose: VMware CVE templates
        command: "nuclei -u https://{target}:{port} -tags vmware,esxi,vcenter,cve"
      - name: govc
        purpose: VMware vSphere CLI probe
        command: "govc about -u https://{target}:{port}"
    nuclei_tags: ["vmware", "esxi", "vcenter", "cve", "rce", "ransomware"]
    common_vulns:
      - "CVE-2021-21974: ESXi OpenSLP RCE (used by ESXiArgs ransomware)"
      - "CVE-2024-37085: ESXi Active Directory auth bypass"
      - "Default root with blank password (legacy)"

  ipmi:
    ports: [623]
    description: "IPMI - Intelligent Platform Management Interface (BMC)"
    tools:
      - name: nmap
        purpose: IPMI version + cipher zero check
        command: "nmap -sU --script ipmi-version,ipmi-cipher-zero,ipmi-brute -p {port} {target}"
      - name: ipmitool
        purpose: IPMI 2.0 over LAN probe
        command: "ipmitool -I lanplus -H {target} -p {port} -U admin -P admin chassis status"
    metasploit:
      - module: auxiliary/scanner/ipmi/ipmi_cipher_zero
        purpose: IPMI 2.0 Cipher 0 auth bypass
      - module: auxiliary/scanner/ipmi/ipmi_dumphashes
        purpose: dump IPMI 2.0 RAKP hashes
    nuclei_tags: ["ipmi", "bmc", "network", "udp", "cve", "rce"]
    common_vulns:
      - "Cipher Zero authentication bypass (any password works)"
      - "IPMI 2.0 RAKP password hash retrieval"
      - "Default root/calvin (Dell), ADMIN/ADMIN (Supermicro)"

  squid:
    ports: [3128, 8080]
    description: "Squid - HTTP caching proxy"
    tools:
      - name: nmap
        purpose: Squid version detection
        command: "nmap -sV -p {port} {target}"
      - name: curl
        purpose: open-proxy check (CONNECT to external)
        command: "curl -x http://{target}:{port} -sk https://www.google.com/"
      - name: nuclei
        purpose: Squid CVE / exposure templates
        command: "nuclei -u http://{target}:{port} -tags squid,proxy,cve"
    nuclei_tags: ["squid", "proxy", "cve", "misconfig"]
    common_vulns:
      - "Open proxy (forwards arbitrary requests)"
      - "CVE-2023-46847: pre-auth heap buffer overflow"

  pcanywhere:
    ports: [5631, 5632]
    description: "Symantec pcAnywhere - remote access"
    tools:
      - name: nmap
        purpose: pcAnywhere detection
        command: "nmap -sV --script pcanywhere-brute -p {port} {target}"
    nuclei_tags: ["pcanywhere", "remote-access", "cve", "legacy"]
    common_vulns:
      - "Plaintext credentials in transit (pre-12.5)"

  # ---- Misc useful ----
  mssql_browser:
    ports: [1434]
    description: "MS SQL Server Browser - instance discovery (UDP)"
    tools:
      - name: nmap
        purpose: MSSQL instance enumeration
        command: "nmap -sU --script ms-sql-info -p {port} {target}"
    metasploit:
      - module: auxiliary/scanner/mssql/mssql_ping
        purpose: discover SQL Server instances
    nuclei_tags: ["mssql", "database", "udp", "info-leak"]
    common_vulns:
      - "Reveals all named instances, ports, and versions"

  zabbix:
    ports: [10050, 10051, 80, 443]
    description: "Zabbix - monitoring server + agent"
    tools:
      - name: nmap
        purpose: Zabbix agent probe
        command: "nmap -sV --script zabbix-agent-version -p {port} {target}"
      - name: nuclei
        purpose: Zabbix CVE templates
        command: "nuclei -u http://{target}:{port} -tags zabbix,monitoring,cve"
    nuclei_tags: ["zabbix", "monitoring", "cve", "rce", "default-login"]
    common_vulns:
      - "CVE-2022-23131: SSO auth bypass"
      - "Default Admin/zabbix credentials"

  splunk:
    ports: [8000, 8089, 8088, 9997]
    description: "Splunk - log analytics + SIEM"
    tools:
      - name: httpx
        purpose: Splunk Web fingerprint
        command: "httpx -u https://{target}:{port} -title -tech-detect"
      - name: nuclei
        purpose: Splunk CVE templates
        command: "nuclei -u https://{target}:{port} -tags splunk,cve,default-login"
    nuclei_tags: ["splunk", "siem", "cve", "default-login", "rce"]
    common_vulns:
      - "CVE-2023-46214: insecure XSLT RCE (auth required)"
      - "Default admin/changeme credentials"

  nodeexporter:
    ports: [9100]
    description: "Prometheus node_exporter - host metrics endpoint"
    tools:
      - name: curl
        purpose: enumerate host metrics
        command: "curl -sk http://{target}:{port}/metrics"
    nuclei_tags: ["prometheus", "node-exporter", "monitoring", "exposure", "info-leak"]
    common_vulns:
      - "Unauthenticated /metrics exposes host CPU, mem, processes, mount points"

# ─────────────────────────────────────────────────────────────────────────
# Tech-stack signatures (G1: detected CMS/framework -> targeted nuclei tags)
# ─────────────────────────────────────────────────────────────────────────
# When httpx/whatweb fingerprint a web technology (stored in
# recon_findings.data->'tech' and ->>'webserver'), the scan-recommender
# matches those tokens against `match:` substrings (case-insensitive) and
# adds nuclei recommendations scoped to the matched `nuclei_tags`.  This
# selects CMS/framework-specific templates instead of only generic
# service-based ones.  Edit freely via the /kb flow -- read at load time.
tech_signatures:
  wordpress:
    match: ["wordpress", "wp-content", "wp-includes"]
    nuclei_tags: ["wordpress", "wp-plugin", "wp-theme"]
    note: "WordPress CMS"
  drupal:
    match: ["drupal"]
    nuclei_tags: ["drupal"]
    note: "Drupal CMS"
  joomla:
    match: ["joomla"]
    nuclei_tags: ["joomla"]
    note: "Joomla CMS"
  magento:
    match: ["magento"]
    nuclei_tags: ["magento"]
    note: "Magento e-commerce"
  tomcat:
    match: ["tomcat", "coyote"]
    nuclei_tags: ["tomcat", "apache"]
    note: "Apache Tomcat"
  jboss:
    match: ["jboss", "wildfly"]
    nuclei_tags: ["jboss"]
    note: "JBoss/WildFly"
  weblogic:
    match: ["weblogic"]
    nuclei_tags: ["weblogic", "oracle"]
    note: "Oracle WebLogic"
  jenkins:
    match: ["jenkins"]
    nuclei_tags: ["jenkins"]
    note: "Jenkins CI"
  gitlab:
    match: ["gitlab"]
    nuclei_tags: ["gitlab"]
    note: "GitLab"
  grafana:
    match: ["grafana"]
    nuclei_tags: ["grafana"]
    note: "Grafana"
  phpmyadmin:
    match: ["phpmyadmin"]
    nuclei_tags: ["phpmyadmin"]
    note: "phpMyAdmin"
  jira:
    match: ["jira"]
    nuclei_tags: ["jira", "atlassian"]
    note: "Atlassian Jira"
  confluence:
    match: ["confluence"]
    nuclei_tags: ["confluence", "atlassian"]
    note: "Atlassian Confluence"
  springboot:
    match: ["spring", "spring boot", "springboot"]
    nuclei_tags: ["springboot", "spring"]
    note: "Spring Boot"
  iis:
    match: ["iis", "microsoft-iis"]
    nuclei_tags: ["iis", "microsoft"]
    note: "Microsoft IIS"
  apache:
    match: ["apache httpd", "apache/"]
    nuclei_tags: ["apache"]
    note: "Apache HTTP Server"
  nginx:
    match: ["nginx"]
    nuclei_tags: ["nginx"]
    note: "nginx"

