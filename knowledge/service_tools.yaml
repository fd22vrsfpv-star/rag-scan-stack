  # =====================================================================
  # Top-100 typical-pentest expansion (PR follow-up 2026-06-07).
  # Each entry has: ports, description, tools[] with runnable commands,
  # metasploit[] where applicable, nuclei_tags, common_vulns.
  # =====================================================================

  # ---- Mail family (in addition to smtp/imap base entries below) ----
  pop3:
    ports: [110, 995]
    description: "POP3 - Post Office Protocol v3 (mail retrieval)"
    tools:
      - name: nmap
        purpose: POP3 version + capabilities
        command: "nmap -sV --script pop3-capabilities,pop3-ntlm-info -p {port} {target}"
      - name: hydra
        purpose: brute force POP3 credentials
        command: "hydra -L users.txt -P passwords.txt pop3://{target}:{port}"
      - name: medusa
        purpose: parallel POP3 brute force
        command: "medusa -h {target} -U users.txt -P passwords.txt -M pop3"
      - name: openssl
        purpose: STARTTLS / SSL banner inspection
        command: "openssl s_client -starttls pop3 -connect {target}:{port}"
    metasploit:
      - module: auxiliary/scanner/pop3/pop3_login
        purpose: POP3 login brute force
      - module: auxiliary/scanner/pop3/pop3_version
        purpose: POP3 version detection
    nuclei_tags: ["pop3", "mail", "network", "default-login", "cve"]
    common_vulns:
      - "Plaintext authentication (no TLS)"
      - "Default / weak credentials"

  imap:
    ports: [143, 993]
    description: "IMAP - Internet Message Access Protocol"
    tools:
      - name: nmap
        purpose: IMAP capabilities + NTLM info
        command: "nmap -sV --script imap-capabilities,imap-ntlm-info -p {port} {target}"
      - name: hydra
        purpose: IMAP brute force
        command: "hydra -L users.txt -P passwords.txt imap://{target}:{port}"
      - name: medusa
        purpose: parallel IMAP brute force
        command: "medusa -h {target} -U users.txt -P passwords.txt -M imap"
      - name: openssl
        purpose: STARTTLS / SSL banner inspection
        command: "openssl s_client -starttls imap -connect {target}:{port}"
    metasploit:
      - module: auxiliary/scanner/imap/imap_version
        purpose: IMAP version
    nuclei_tags: ["imap", "mail", "network", "cve"]
    common_vulns:
      - "Plaintext authentication"
      - "NTLM information leak"

  nntp:
    ports: [119, 433, 563]
    description: "NNTP - Network News Transfer Protocol"
    tools:
      - name: nmap
        purpose: NNTP detection
        command: "nmap -sV --script nntp-ntlm-info -p {port} {target}"
      - name: ncat
        purpose: manual NNTP probe
        command: "ncat {target} {port}"
    nuclei_tags: ["nntp", "network"]
