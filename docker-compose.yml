  pentest-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pentest-dashboard
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: ${DEFAULT_MEM_LIMIT:-4g}
    cpus: ${DEFAULT_CPUS:-2.0}
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-dev}
      TZ: ${TZ:-America/New_York}
      RAG_API_URL: https://rag-api:8000
      NMAP_SCANNER_URL: https://nmap_scanner:8012
      WEB_SCANNER_URL: https://web-scanner:8010
      NUCLEI_URL: https://nuclei-runner:8011
      PD_RUNNER_URL: https://pd-runner:8023
      OSINT_RUNNER_URL: https://osint-runner:8024
      EXPLOIT_RUNNER_URL: https://exploit-runner:8017
      SCAN_RECOMMENDER_URL: https://scan-recommender:8013
      AUTOGEN_URL: https://autogen-agents:8015
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      BRUTUS_RUNNER_URL: https://brutus-runner:8025
      PLAYWRIGHT_SCANNER_URL: https://playwright-scanner:8014
      ZAP_URL: http://zap:8090
      ZAP_API_KEY: ${ZAP_API_KEY:-changeme}
      API_KEY: ${API_KEY:-changeme}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:31b}
      TUNNEL_MANAGER_URL: https://node-manager:8027
      GPU_NAME: ${GPU_NAME:-}
      GPU_TOTAL_MEMORY_GB: ${GPU_TOTAL_MEMORY_GB:-0}
      # LLM Backend
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_ENDPOINT: ${AZURE_ENDPOINT:-}
      AZURE_MODEL: ${AZURE_MODEL:-gpt-4o}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2024-08-01-preview}
      # Direct Postgres access for the BFF (scan_recommendations status
      # writeback path -- see dashboard/bff/db.py).  Matches the env-var
      # names scan_recommender uses so the same .env feeds both services.
      DB_HOST: ${DB_HOST:-rag-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-scans}
      DB_USER: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-app}
    depends_on:
      rag-api:
        condition: service_started
      nmap_scanner:
        condition: service_started
      web-scanner:
        condition: service_started
      nuclei-runner:
        condition: service_started
      autogen-agents:
        condition: service_started
    volumes:
      - ./scan_results:/scan_results
      - ./scan_audit:/scan_audit
      - ./osint_reports:/osint_reports:ro
      - ./Docs:/docs:ro
      - ./mcp:/mcp:ro
      - ./mcp/third_party:/mcp/third_party
      - ./mcpo/config.json:/mcpo/config.json
      - ./db-config.json:/app/db-config.json:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Enable docker exec for WireGuard status querying
    networks:
      - agents_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3002:443"
      - "3001:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://127.0.0.1:443/api/health || curl -f http://127.0.0.1:80/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
